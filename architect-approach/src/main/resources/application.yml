spring:
  application:
    name: subastas-api
  datasource:
    url: jdbc:postgresql://localhost:5432/subastasdb
    username: subastas
    password: subastas
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false
    show-sql: false

server:
  port: 8080

logging:
  level:
    com.subastas: INFO
