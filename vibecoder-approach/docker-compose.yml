services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auctiondb
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auctiondb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/auctiondb
      SPRING_DATASOURCE_USERNAME: auction
      SPRING_DATASOURCE_PASSWORD: auction
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
