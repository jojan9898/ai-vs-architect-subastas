services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: subastas
      POSTGRES_PASSWORD: subastas
      POSTGRES_DB: subastasdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subastas"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8095:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/subastasdb
      SPRING_DATASOURCE_USERNAME: subastas
      SPRING_DATASOURCE_PASSWORD: subastas

volumes:
  pgdata:
